name: CI

on:
  push:
    branches: [main]
    paths: [Projects/todos/**]
  pull_request:
    branches: [main]
    paths: [Projects/todos/**]

defaults:
  run:
    working-directory: Projects/todos

jobs:
  ci:
    runs-on: ubuntu-latest

    env:
      # Dummy values — Google OAuth is not exercised in tests
      GOOGLE_CLIENT_ID: ci-placeholder
      GOOGLE_CLIENT_SECRET: ci-placeholder

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Projects/todos/package-lock.json

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Install npm dependencies
        run: npm ci

      # ── Static checks (no infra needed) ──────────────────────
      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      # ── Start Supabase ───────────────────────────────────────
      - name: Start Supabase
        run: supabase start

      - name: Generate .env.local from Supabase
        run: |
          supabase status -o env 2>/dev/null \
            | sed -n 's/^API_URL=/NEXT_PUBLIC_SUPABASE_URL=/p; s/^ANON_KEY=/NEXT_PUBLIC_SUPABASE_ANON_KEY=/p' \
            | tr -d '"' > .env.local
          cat .env.local

      # ── Unit tests ───────────────────────────────────────────
      - name: Unit tests
        run: npm run test:unit

      # ── Database tests (pgTAP) ───────────────────────────────
      - name: Database tests
        run: npm run test:db

      # ── E2E tests (Playwright) ───────────────────────────────
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: Projects/todos/test-results/
          retention-days: 7
